<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div ref="{{ setRoot }}" style="width:100%; line-height:0">
  <svg viewBox="0 0 340 240" style="width:100%; height:auto; display:block; overflow:visible" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="gwabdclip">
        <path d="M150,122 C150,74 180,50 214,50 C262,50 302,84 312,122 C302,160 262,194 214,194 C180,194 150,170 150,122 Z"></path>
      </clipPath>
    </defs>
    <!-- wings -->
    <path d="M126,96 Q205,2 308,30 Q232,72 150,110 Z" style="fill:var(--wasp-wing,rgba(33,98,212,0.16)); stroke:var(--wasp-wing-stroke,rgba(33,98,212,0.34)); stroke-width:2"></path>
    <path d="M130,104 Q196,44 276,74 Q212,96 148,116 Z" style="fill:var(--wasp-wing,rgba(33,98,212,0.16)); stroke:var(--wasp-wing-stroke,rgba(33,98,212,0.34)); stroke-width:2"></path>
    <!-- legs -->
    <g style="fill:none; stroke:var(--wasp-dark,#181B20); stroke-width:5; stroke-linecap:round; stroke-linejoin:round">
      <path d="M96,150 L86,180 L100,190"></path>
      <path d="M116,154 L114,186 L130,194"></path>
      <path d="M134,152 L146,182 L162,190"></path>
    </g>
    <!-- antennae -->
    <g style="fill:none; stroke:var(--wasp-dark,#181B20); stroke-width:5; stroke-linecap:round">
      <path d="M50,100 Q36,66 24,56"></path>
      <path d="M60,96 Q56,62 52,46"></path>
    </g>
    <circle cx="24" cy="56" r="4.5" style="fill:var(--wasp-dark,#181B20)"></circle>
    <circle cx="52" cy="46" r="4.5" style="fill:var(--wasp-dark,#181B20)"></circle>
    <!-- abdomen -->
    <path d="M150,122 C150,74 180,50 214,50 C262,50 302,84 312,122 C302,160 262,194 214,194 C180,194 150,170 150,122 Z" style="fill:var(--wasp-body,#F5A623)"></path>
    <!-- stinger -->
    <path d="M305,109 L305,135 L337,122 Z" style="fill:var(--wasp-dark,#181B20)"></path>
    <!-- stripes: dark bands clipped to abdomen -->
    <g clip-path="url(#gwabdclip)">
      <rect x="171" y="48" width="30" height="148" rx="8" style="fill:var(--wasp-stripe,#181B20)"></rect>
      <rect x="215" y="48" width="30" height="148" rx="8" style="fill:var(--wasp-stripe,#181B20)"></rect>
      <rect x="259" y="48" width="30" height="148" rx="8" style="fill:var(--wasp-stripe,#181B20)"></rect>
    </g>
    <!-- icons cut into stripes, in body color: add / remove / sync, enlarged + staggered -->
    <g style="fill:none; stroke:var(--wasp-body,#F5A623); stroke-linecap:round; stroke-linejoin:round">
      <g transform="translate(186,100) scale(1.95) translate(-12,-12)" style="stroke-width:2.3"><path d="M5 12h14"></path><path d="M12 5v14"></path></g>
      <g transform="translate(230,122) scale(1.95) translate(-12,-12)" style="stroke-width:2.3"><path d="M5 12h14"></path></g>
      <g transform="translate(274,144) scale(1.5) translate(-12,-12)" style="stroke-width:3.0"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></g>
    </g>
    <!-- petiole -->
    <path d="M126,122 C140,114 150,114 156,122 C150,130 140,130 126,122 Z" style="fill:var(--wasp-dark,#181B20)"></path>
    <!-- thorax -->
    <ellipse cx="100" cy="122" rx="36" ry="31" style="fill:var(--wasp-dark,#181B20)"></ellipse>
    <!-- head -->
    <circle cx="56" cy="120" r="27" style="fill:var(--wasp-dark,#181B20)"></circle>
    <circle cx="48" cy="113" r="4.5" style="fill:var(--wasp-eye,#F5720A)"></circle>
  </svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:212},&quot;body&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#f0a100&quot;},&quot;dark&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#181B20&quot;},&quot;stripe&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#181B20&quot;},&quot;eye&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFFFFF&quot;},&quot;wing&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;rgba(33,98,212,0.15)&quot;},&quot;wingStroke&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;rgba(33,98,212,0.34)&quot;}}">
class Component extends DCLogic {
  applyVars(el) {
    if (!el) return;
    const p = this.props;
    const map = {
      '--wasp-body': p.body,
      '--wasp-dark': p.dark,
      '--wasp-stripe': p.stripe,
      '--wasp-eye': p.eye,
      '--wasp-wing': p.wing,
      '--wasp-wing-stroke': p.wingStroke
    };
    for (const k in map) {
      if (map[k] != null && map[k] !== '') el.style.setProperty(k, map[k]);
    }
  }
  renderVals() {
    return { setRoot: (el) => { this._el = el; this.applyVars(el); } };
  }
  componentDidUpdate() { this.applyVars(this._el); }
}
</script>
</body>
</html>
